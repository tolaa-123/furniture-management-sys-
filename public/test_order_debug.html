<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        #debug-output { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 12px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🔍 Order Form Debug Test</h1>
    <p>Fill out this form and click "Test Submit" to see what data is being sent.</p>

    <form id="testForm">
        <div class="form-group">
            <label>Furniture Type: *</label>
            <select name="furniture_type" required>
                <option value="">Select Type...</option>
                <option value="Table">Table</option>
                <option value="Chair">Chair</option>
                <option value="Bed">Bed</option>
                <option value="Sofa">Sofa</option>
                <option value="Desk">Desk</option>
            </select>
        </div>

        <div class="form-group">
            <label>Color: *</label>
            <select name="color" required>
                <option value="">Select Color...</option>
                <option value="Natural Wood">Natural Wood</option>
                <option value="Brown">Brown</option>
                <option value="Dark Brown">Dark Brown</option>
                <option value="Black">Black</option>
                <option value="White">White</option>
            </select>
        </div>

        <div class="form-group">
            <label>Length (m): *</label>
            <input type="number" name="length" step="0.01" min="0.01" value="2" required>
        </div>

        <div class="form-group">
            <label>Width (m): *</label>
            <input type="number" name="width" step="0.01" min="0.01" value="1" required>
        </div>

        <div class="form-group">
            <label>Height (m): *</label>
            <input type="number" name="height" step="0.01" min="0.01" value="0.8" required>
        </div>

        <div class="form-group">
            <label>Quantity: *</label>
            <input type="number" name="quantity" min="1" value="1" required>
        </div>

        <div class="form-group">
            <label>Budget Range: *</label>
            <select name="budget_range" required>
                <option value="">Select Budget...</option>
                <option value="Under ETB 5,000">Under ETB 5,000</option>
                <option value="ETB 5,000 - ETB 10,000">ETB 5,000 - ETB 10,000</option>
                <option value="ETB 10,000 - ETB 20,000">ETB 10,000 - ETB 20,000</option>
                <option value="Above ETB 20,000">Above ETB 20,000</option>
            </select>
        </div>

        <div class="form-group">
            <label>Design Description: *</label>
            <textarea name="design_description" rows="4" required>Test furniture for debugging purposes</textarea>
        </div>

        <div class="form-group">
            <label>Preferred Delivery Date:</label>
            <input type="date" name="preferred_delivery_date">
        </div>

        <input type="hidden" name="order_number" value="ORD-TEST-12345">
        <input type="hidden" name="customer_id" value="1">
        <input type="hidden" name="csrf_token" value="test_token_12345">

        <button type="submit">🔍 Test Submit (Debug Mode)</button>
    </form>

    <div id="debug-output"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const debugOutput = document.getElementById('debug-output');
            
            // Show what we're sending
            debugOutput.innerHTML = '<h3>📤 Sending Data:</h3>';
            const sendingData = {};
            for (let [key, value] of formData.entries()) {
                sendingData[key] = value;
                debugOutput.innerHTML += `<div>${key}: <strong>${value || '(empty)'}</strong></div>`;
            }
            
            debugOutput.innerHTML += '<h3>⏳ Waiting for response...</h3>';
            
            // Send to debug API
            fetch('./api/submit_custom_order_DEBUG.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                debugOutput.innerHTML = '<h3>📥 Server Response:</h3>';
                debugOutput.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                // Highlight errors
                if (data.debug && data.debug.failed_validations && data.debug.failed_validations.length > 0) {
                    debugOutput.innerHTML += '<h3 class="error">❌ Failed Validations:</h3>';
                    data.debug.failed_validations.forEach(err => {
                        debugOutput.innerHTML += `<div class="error">• ${err}</div>`;
                    });
                } else {
                    debugOutput.innerHTML += '<h3 class="success">✅ All validations passed!</h3>';
                }
                
                // Show validation checks
                if (data.debug && data.debug.validation_checks) {
                    debugOutput.innerHTML += '<h3>Validation Checks:</h3>';
                    data.debug.validation_checks.forEach(check => {
                        const className = check.includes('✅') ? 'success' : 'error';
                        debugOutput.innerHTML += `<div class="${className}">${check}</div>`;
                    });
                }
            })
            .catch(error => {
                debugOutput.innerHTML = '<h3 class="error">❌ Error:</h3>';
                debugOutput.innerHTML += '<pre>' + error.toString() + '</pre>';
            });
        });
    </script>
</body>
</html>
